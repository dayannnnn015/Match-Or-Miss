name: match_or_miss
description: A cognitive puzzle game for executive function training
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  http: ^1.1.0

  flutter_secure_storage: ^9.0.0
  # UI & Animation
  flutter_animate: ^4.0.0
  
  # State Management
  provider: ^6.1.1
  
  # Firebase
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  firebase_auth: ^4.18.0
  
  # Utilities
  assets_audio_player: ^3.1.0
  audioplayers: ^5.2.1
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  
  # UI Components
  flutter_staggered_grid_view: ^0.7.0
  fancy_bottom_navigation: ^0.3.3
  shimmer: ^3.0.0

  fl_chart: ^0.66.0

    # Animations
  lottie: ^2.7.0

  # Local storage
  sqflite: ^2.3.0
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/sounds/placeholder.txt
    - assets/images/placeholder.txt
  
