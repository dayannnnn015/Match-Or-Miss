name: match_or_miss
description: A cognitive puzzle game for executive function training
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  http: ^1.1.0
  flutter_secure_storage: ^9.0.0
  flutter_animate: ^4.0.0
  provider: ^6.1.1
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  audioplayers: ^5.2.1
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0
  fl_chart: ^0.66.0
  lottie: ^2.7.0
  sqflite: ^2.3.0
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/background.mp3
    - assets/sounds/submit.mp3
    - assets/sounds/match.mp3
    - assets/sounds/win.mp3
    - assets/sounds/timeout.mp3
    - assets/sounds/swap.mp3
    - assets/sounds/error.mp3
    - assets/images/placeholder.txt